<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Sitio fuera de servicio</title>
  <meta name="description" content="Este sitio no está en servicio." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #f9f8f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      text-align: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(232, 168, 58, 0.25), transparent 45%),
        radial-gradient(circle at 80% 80%, rgba(200, 134, 10, 0.25), transparent 45%),
        linear-gradient(135deg, #181818 0%, #2d2d2d 100%);
      background-attachment: fixed;
    }

    .card {
      position: relative;
      max-width: 480px;
      background: rgba(34, 34, 34, 0.7);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(232, 168, 58, 0.25);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
    }

    .close-btn {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: #d6d6d6;
      font-size: 1.1rem;
      line-height: 1;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .close-btn:hover,
    .close-btn:focus-visible {
      background: rgba(232, 168, 58, 0.2);
      color: #e8a83a;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.75rem;
      color: #e8a83a;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #d6d6d6;
    }
  </style>
</head>
<body>
  <main class="card">
    <button type="button" class="close-btn" id="closeBtn" aria-label="Cerrar">&times;</button>
    <div class="icon" aria-hidden="true">🔧</div>
    <h1>Sitio fuera de servicio</h1>
    <p>Este sitio web no está disponible, comuníquese con el creador o con el administrador del sitio.</p>
  </main>
  <script src="close.js"></script>
</body>
</html>
